<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contagem Regressiva da Nossa Viagem 💕</title>
    <link rel="stylesheet" href="style.css">
</head>
<body><h2 style="margin-top:40px;">Nossa Viagem ao Peru 🇵🇪</h2>

<div class="gallery">
  <img src="images/foto1.jpg" alt="Viagem Peru 1">
  <img src="images/foto2.jpg" alt="Viagem Peru 2">
  <img src="images/foto3.jpg" alt="Viagem Peru 3">
</div>

<style>
  .gallery {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    margin-top: 20px;
  }

  .gallery img {
    width: 280px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    transition: transform 0.3s ease;
  }

  .gallery img:hover {
    transform: scale(1.05);
  }
</style>
    <div class="container">
        <h1>Contagem Regressiva da Nossa Viagem ✈️💖</h1>
        <div id="countdown">
            <span id="days">00</span> dias 
            <span id="hours">00</span> horas 
            <span id="minutes">00</span> minutos 
            <span id="seconds">00</span> segundos
        </div>
    </div>
    <!-- Corações animados -->
    <div class="hearts"></div>
    <script src="script.js"></script>
</body>
</html>
