<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Larissa & Eduardo - Peru 2026 ❤️</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(to bottom, #4facfe, #ffffff);
        text-align: center;
        color: #333;
        overflow-x: hidden;
    }

    header {
        padding: 50px 20px;
        animation: fadeIn 2s ease-in-out;
    }

    h1 {
        font-size: 2.8em;
        color: #e63946;
    }

    h2 {
        font-weight: normal;
    }

    .countdown {
        font-size: 2.2em;
        margin: 25px 0;
        font-weight: bold;
        color: #1d3557;
        background: rgba(255,255,255,0.8);
        display: inline-block;
        padding: 15px 25px;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        padding: 30px;
    }

    .gallery img {
        width: 100%;
        height: 260px;
        object-fit: cover;
        border-radius: 20px;
        box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        transition: transform 0.4s ease;
    }

    .gallery img:hover {
        transform: scale(1.08);
    }

    footer {
        margin: 50px 0;
        font-size: 1.3em;
        padding: 0 20px;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(-20px);}
        to {opacity: 1; transform: translateY(0);}
    }
</style>
</head>

<body>

<header>
    <h1>Larissa ❤️ Eduardo</h1>
    <h2>Contagem regressiva para o nosso sonho no Peru 🇵🇪</h2>
    <p>05 de setembro de 2026</p>
    <div class="countdown" id="countdown"></div>
</header>

<section class="gallery">
    <img src="https://images.unsplash.com/photo-1505672678657-cc7037095e6f" alt="Machu Picchu">
    <img src="https://images.unsplash.com/photo-1602002418082-6b0c9a8d8f8c" alt="Laguna Humantay">
    <img src="https://images.unsplash.com/photo-1549880338-65ddcdfd017b" alt="Montanha Colorida">
    <img src="https://images.unsplash.com/photo-1544551763-46a013bb70d5" alt="Lhamas no Peru">
</section>

<footer>
    Meu amor, cada segundo que passa nos aproxima dessa aventura incrível juntos.  
    Que o Peru seja só mais um capítulo da nossa história ❤️✈️
</footer>

<script>
    const targetDate = new Date("September 05, 2026 00:00:00").getTime();

    const countdown = setInterval(function() {
        const now = new Date().getTime();
        const distance = targetDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("countdown").innerHTML =
            days + " dias " + hours + "h " + minutes + "m " + seconds + "s ";

        if (distance < 0) {
            clearInterval(countdown);
            document.getElementById("countdown").innerHTML = 
                "CHEGOU O NOSSO DIA NO PERU 🇵🇪❤️✈️";
        }
    }, 1000);
</script>

</body>
</html>
