<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Du & Lari ✨ Peru 2026</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: radial-gradient(ellipse at bottom, #0d1b2a 0%, #000814 100%);
        color: #fff;
        text-align: center;
        overflow-x: hidden;
    }

    /* ⭐ ESTRELAS */
    .stars {
        position: fixed;
        width: 100%;
        height: 100%;
        background: transparent;
        z-index: -1;
        overflow: hidden;
    }

    .star {
        position: absolute;
        width: 2px;
        height: 2px;
        background: white;
        border-radius: 50%;
        animation: twinkle 2s infinite alternate;
    }

    @keyframes twinkle {
        from {opacity: 0.2;}
        to {opacity: 1;}
    }

    header {
        padding: 60px 20px 30px;
        animation: fadeIn 2s ease-in-out;
    }

    h1 {
        font-size: 3em;
        color: #ffd166;
        letter-spacing: 3px;
    }

    h2 {
        font-weight: 300;
        color: #ccc;
    }

    .date {
        margin-top: 10px;
        font-size: 1.2em;
        color: #aaa;
    }

    .countdown {
        margin: 30px auto;
        font-size: 2.2em;
        font-weight: bold;
        padding: 20px 40px;
        border-radius: 25px;
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(10px);
        width: fit-content;
        box-shadow: 0 0 30px rgba(255,209,102,0.4);
        color: #ffd166;
    }

    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 30px;
        padding: 40px;
    }

    .gallery img {
        width: 100%;
        height: 420px;
        object-fit: cover;
        border-radius: 25px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.7);
        transition: transform 0.5s ease, box-shadow 0.5s ease;
    }

    .gallery img:hover {
        transform: scale(1.05);
        box-shadow: 0 20px 50px rgba(255,209,102,0.6);
    }

    .secret-btn {
        margin-top: 30px;
        padding: 15px 35px;
        border: none;
        border-radius: 50px;
        font-size: 1.1em;
        background: linear-gradient(45deg, #ffd166, #ff9f1c);
        color: #000;
        cursor: pointer;
        transition: 0.3s;
    }

    .secret-btn:hover {
        transform: scale(1.1);
    }

    .secret-message {
        margin-top: 20px;
        font-size: 1.3em;
        display: none;
        color: #ffdd99;
        animation: fadeIn 1s ease-in-out;
    }

    footer {
        margin: 60px 20px;
        font-size: 1.2em;
        color: #ccc;
        max-width: 800px;
        margin-left: auto;
        margin-right: auto;
        line-height: 1.6em;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(10px);}
        to {opacity: 1; transform: translateY(0);}
    }
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<header>
    <h1>Du ✨ Lari</h1>
    <h2>Nosso sonho peruano sob as estrelas</h2>
    <div class="date">05 de Setembro de 2026</div>
    <div class="countdown" id="countdown"></div>

    <button class="secret-btn" onclick="showSecret()">
        💌 Clique aqui
    </button>
    <div class="secret-message" id="secretMessage">
        Prepara a mochila pra trazer uma lhama bebê de lembrança 🦙❤️
    </div>
</header>

<section class="gallery">
    <img src="foto1.jpeg">
    <img src="foto2.jpeg">
    <img src="foto3.jpeg">
</section>

<footer>
    Que as estrelas dos Andes iluminem cada passo da nossa jornada.
    O Peru será só mais um capítulo da nossa história ✨❤️
</footer>

<script>
    // Contagem regressiva
    const targetDate = new Date("September 05, 2026 00:00:00").getTime();
    const countdown = setInterval(function() {
        const now = new Date().getTime();
        const distance = targetDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("countdown").innerHTML =
            days + " dias • " + hours + "h • " + minutes + "m • " + seconds + "s";

        if (distance < 0) {
            clearInterval(countdown);
            document.getElementById("countdown").innerHTML =
                "O Peru nos espera ❤️✈️🇵🇪";
        }
    }, 1000);

    // Estrelas
    const starsContainer = document.getElementById("stars");
    for (let i = 0; i < 150; i++) {
        let star = document.createElement("div");
        star.className = "star";
        star.style.top = Math.random() * 100 + "%";
        star.style.left = Math.random() * 100 + "%";
        star.style.animationDuration = (Math.random() * 3 + 1) + "s";
        starsContainer.appendChild(star);
    }

    function showSecret() {
        document.getElementById("secretMessage").style.display = "block";
    }
</script>

</body>
</html>
