<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Larissa & Eduardo - Peru 2026 ❤️</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
        color: #f5f5f5;
        text-align: center;
        overflow-x: hidden;
    }

    header {
        padding: 60px 20px 30px;
        animation: fadeIn 2s ease-in-out;
    }

    h1 {
        font-size: 3em;
        color: #f8c291;
        letter-spacing: 2px;
    }

    h2 {
        font-weight: 300;
        margin-top: 10px;
        color: #ddd;
    }

    .date {
        margin-top: 10px;
        font-size: 1.2em;
        color: #aaa;
    }

    .countdown {
        margin: 30px auto;
        font-size: 2.2em;
        font-weight: bold;
        padding: 20px 40px;
        border-radius: 20px;
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(8px);
        width: fit-content;
        box-shadow: 0 0 25px rgba(248,194,145,0.3);
        color: #f8c291;
    }

    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 25px;
        padding: 40px;
    }

    .gallery img {
        width: 100%;
        height: 380px;
        object-fit: cover;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        transition: transform 0.5s ease, box-shadow 0.5s ease;
    }

    .gallery img:hover {
        transform: scale(1.05);
        box-shadow: 0 15px 40px rgba(248,194,145,0.5);
    }

    footer {
        margin: 60px 20px;
        font-size: 1.2em;
        color: #ccc;
        max-width: 800px;
        margin-left: auto;
        margin-right: auto;
        line-height: 1.6em;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(-20px);}
        to {opacity: 1; transform: translateY(0);}
    }
</style>
</head>

<body>

<header>
    <h1>Larissa ✨ Eduardo</h1>
    <h2>Contagem regressiva para o nosso sonho no Peru</h2>
    <div class="date">05 de Setembro de 2026</div>
    <div class="countdown" id="countdown"></div>
</header>

<section class="gallery">
    <img src="foto1.jpeg" alt="Larissa e Eduardo na montanha">
    <img src="foto2.jpeg" alt="Larissa e Eduardo com lhama">
    <img src="foto3.jpeg" alt="Larissa e Eduardo em Machu Picchu">
</section>

<footer>
    Cada dia que passa nos aproxima dessa aventura inesquecível.  
    Que as montanhas do Peru sejam testemunhas do nosso amor,  
    das nossas risadas e da nossa história que só está começando. ❤️
</footer>

<script>
    const targetDate = new Date("September 05, 2026 00:00:00").getTime();

    const countdown = setInterval(function() {
        const now = new Date().getTime();
        const distance = targetDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("countdown").innerHTML =
            days + " dias • " + hours + "h • " + minutes + "m • " + seconds + "s";

        if (distance < 0) {
            clearInterval(countdown);
            document.getElementById("countdown").innerHTML =
                "O Peru nos espera ❤️✈️🇵🇪";
        }
    }, 1000);
</script>

</body>
</html>
