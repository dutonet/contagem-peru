<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nosso Peru 2026 ❤️</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(to bottom, #87ceeb, #ffffff);
        text-align: center;
        color: #333;
    }

    header {
        padding: 40px 20px;
    }

    h1 {
        font-size: 2.5em;
    }

    .countdown {
        font-size: 2em;
        margin: 20px 0;
        font-weight: bold;
        color: #e63946;
    }

    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 15px;
        padding: 20px;
    }

    .gallery img {
        width: 100%;
        height: 250px;
        object-fit: cover;
        border-radius: 15px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        transition: transform 0.3s;
    }

    .gallery img:hover {
        transform: scale(1.05);
    }

    footer {
        margin: 40px 0;
        font-size: 1.2em;
    }
</style>
</head>

<body>

<header>
    <h1>Rumo ao Peru, meu amor ❤️</h1>
    <p>Nossa aventura começa em:</p>
    <div class="countdown" id="countdown"></div>
</header>

<section class="gallery">
    <img src="https://images.unsplash.com/photo-1505672678657-cc7037095e6f" alt="Machu Picchu">
    <img src="https://images.unsplash.com/photo-1602002418082-6b0c9a8d8f8c" alt="Laguna Humantay">
    <img src="https://images.unsplash.com/photo-1549880338-65ddcdfd017b" alt="Montanha Colorida">
    <img src="https://images.unsplash.com/photo-1544551763-46a013bb70d5" alt="Lhamas no Peru">
</section>

<footer>
    Te amo e mal posso esperar por essa viagem incrível juntos ✈️🇵🇪
</footer>

<script>
    const targetDate = new Date("September 05, 2026 00:00:00").getTime();

    const countdown = setInterval(function() {
        const now = new Date().getTime();
        const distance = targetDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("countdown").innerHTML =
            days + " dias " + hours + "h " + minutes + "m " + seconds + "s ";

        if (distance < 0) {
            clearInterval(countdown);
            document.getElementById("countdown").innerHTML = "Chegou o grande dia! 🇵🇪❤️";
        }
    }, 1000);
</script>

</body>
</html>
